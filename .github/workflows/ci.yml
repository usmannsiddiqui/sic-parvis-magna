name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be on PATH before setup-node so its pnpm cache works.
      # Version is inferred from package.json "packageManager" — do not pin here.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # a11y suite drives a real Chromium via Playwright's webServer (pnpm dev).
      - run: pnpm exec playwright install --with-deps chromium

      # Full quality gate — every check must pass, none may silently no-op.
      - run: pnpm test
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test:a11y
